name: ai-review

# =============================================================================
# AI risk review of plugin submissions — ADVISORY ONLY (it COMMENTS, never merges).
#
# SECURITY MODEL — pull_request_target, no untrusted-code execution:
#   `pull_request_target` runs in the context of the BASE repo, so it has a token
#   that can comment on the PR. That token is privileged, which is exactly why
#   this job MUST NOT check out or execute any code from the PR head:
#     - We do NOT `actions/checkout` the PR branch.
#     - We do NOT run the submission's scripts, build steps, or the plugin artifact.
#     - We read the changed `catalog/**/plugin.json` files via the GitHub API
#       (the PR diff) — data, not code.
#     - We MAY download the author-hosted artifact to a temp dir for STATIC
#       inspection only (file listing / string scan); we never extract-and-run it.
#   This prevents the classic pull_request_target pwn where attacker PR code runs
#   with the base repo's secrets. The only secret used (AI_REVIEW_API_KEY) is sent
#   to the configured OpenAI-compatible endpoint for the assessment; it is never
#   exposed to PR-controlled code.
#
# CONFIG — any OpenAI-compatible endpoint (no paid model API required):
#   - AI_REVIEW_BASE_URL : repo VARIABLE (vars), e.g. https://api.groq.com/openai/v1
#                          (a free, no-card Groq key) or a self-hosted AiHummer
#                          gateway / Ollama at http://<host>/v1 (fully local/free).
#                          Optional secret AI_REVIEW_BASE_URL override wins if set.
#   - AI_REVIEW_MODEL    : repo VARIABLE, e.g. llama-3.3-70b-versatile.
#   - AI_REVIEW_API_KEY  : repo SECRET (the endpoint's API key).
#   If AI_REVIEW_BASE_URL or AI_REVIEW_API_KEY is empty ⇒ the review skips (exit 0).
# =============================================================================

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - "catalog/**"

permissions:
  contents: read          # read base repo + diff via API
  pull-requests: write    # post the review comment

# One advisory review per PR; a new push supersedes the in-flight run.
concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ai-review:
    runs-on: ubuntu-latest   # GitHub-hosted; no self-hosted infra for this token
    timeout-minutes: 15      # bounds the artifact fetch + AI endpoint call
    steps:
      - name: Gate on AI_REVIEW config
        id: gate
        env:
          # base URL: variable, with optional secret override taking precedence.
          AI_REVIEW_BASE_URL: ${{ secrets.AI_REVIEW_BASE_URL || vars.AI_REVIEW_BASE_URL }}
          AI_REVIEW_API_KEY: ${{ secrets.AI_REVIEW_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${AI_REVIEW_BASE_URL:-}" ] || [ -z "${AI_REVIEW_API_KEY:-}" ]; then
            echo "AI review skipped: set AI_REVIEW_BASE_URL + AI_REVIEW_API_KEY (e.g. a free Groq key) to enable."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      # Check out the BASE repo at the BASE ref (our own trusted code) so the
      # review SCRIPT is on disk. This is explicitly NOT the PR head — `ref` is
      # pinned to the base branch, so no attacker-controlled code is fetched.
      - name: Checkout base (trusted) ref
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      # NOTE: the PR HEAD is never checked out or executed. The script below reads
      # the changed plugin.json files from the GitHub API (data, not code).
      - name: AI risk review
        if: steps.gate.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          AI_REVIEW_BASE_URL: ${{ secrets.AI_REVIEW_BASE_URL || vars.AI_REVIEW_BASE_URL }}
          AI_REVIEW_MODEL: ${{ vars.AI_REVIEW_MODEL }}
          AI_REVIEW_API_KEY: ${{ secrets.AI_REVIEW_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: node .github/scripts/ai-review.mjs
