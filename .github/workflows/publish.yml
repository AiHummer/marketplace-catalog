name: publish

# On merge to main: counter-sign every accepted submission with the AiHummer
# registry private key and publish the assembled community catalog
# (object key `community-catalog.json`) to the CDN.
# Gated on secrets — if the operator has not wired them yet, the job prints a
# clear notice and exits 0 (the repo is usable before secrets exist).
on:
  push:
    branches: [main]
    paths:
      - "catalog/**"
      - "publishers/**"
      - "scripts/build-catalog.mjs"

permissions:
  contents: read

# Serialize publishes so two merges can't race the counter-sign + CDN upload.
# Never cancel an in-flight publish (it holds the signing key mid-upload).
concurrency:
  group: publish-catalog
  cancel-in-progress: false

jobs:
  publish:
    timeout-minutes: 15
    # GitHub-HOSTED runner. This job is TRUSTED — it only runs on push to main
    # (post-merge, maintainer-gated code), never on untrusted PR head — so a
    # hosted runner with secrets is safe. The MinIO client `mc` is installed in a
    # step below.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check secrets are wired
        id: gate
        env:
          REGISTRY_SIGNING_KEY: ${{ secrets.REGISTRY_SIGNING_KEY }}
          CDN_ENDPOINT: ${{ secrets.CDN_ENDPOINT }}
          CDN_ACCESS_KEY: ${{ secrets.CDN_ACCESS_KEY }}
          CDN_SECRET_KEY: ${{ secrets.CDN_SECRET_KEY }}
          CDN_BUCKET: ${{ secrets.CDN_BUCKET }}
        run: |
          set -euo pipefail
          MISSING=""
          [ -z "${REGISTRY_SIGNING_KEY:-}" ] && MISSING="$MISSING REGISTRY_SIGNING_KEY"
          [ -z "${CDN_ENDPOINT:-}" ]        && MISSING="$MISSING CDN_ENDPOINT"
          [ -z "${CDN_ACCESS_KEY:-}" ]      && MISSING="$MISSING CDN_ACCESS_KEY"
          [ -z "${CDN_SECRET_KEY:-}" ]      && MISSING="$MISSING CDN_SECRET_KEY"
          [ -z "${CDN_BUCKET:-}" ]          && MISSING="$MISSING CDN_BUCKET"
          if [ -n "$MISSING" ]; then
            echo "::notice::publish skipped: set repo secrets$MISSING to enable. See README.md (Publishing secrets)."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      # RA-MKT-02: re-validate every submission on main BEFORE counter-signing, so
      # the trust-minting step never vouches for a submission that skipped PR
      # validation (direct push / admin merge / branch-protection gap). validate.mjs
      # exits non-zero on any signature/scan/schema error, failing the publish.
      # (build-catalog.mjs also re-runs the manifest scan per entry as a backstop.)
      - name: Validate submissions (gate)
        run: node scripts/validate.mjs

      - name: Assemble + counter-sign catalog.json
        if: steps.gate.outputs.enabled == 'true'
        env:
          REGISTRY_SIGNING_KEY: ${{ secrets.REGISTRY_SIGNING_KEY }}
        run: |
          set -euo pipefail
          # build-catalog.mjs prints how many entries it counter-signed and how
          # many it EXCLUDED per revoked.json (the yank list).
          OUTPUT=$(node scripts/build-catalog.mjs)
          echo "$OUTPUT"
          # surface the revoke exclusion count as a job notice.
          echo "$OUTPUT" | grep -E 'excluded [0-9]+ revoked' | sed 's/^/::notice::/' || true

      - name: Install MinIO client (mc)
        if: steps.gate.outputs.enabled == 'true'
        env:
          # Pinned + checksum-verified. This job holds the registry signing key +
          # CDN creds, so it must never fetch a FLOATING `mc`. To bump: pick a new
          # release and read its hash from
          # dl.min.io/client/mc/release/linux-amd64/archive/mc.<RELEASE>.sha256sum
          # then update BOTH MC_RELEASE and MC_SHA256 together.
          MC_RELEASE: RELEASE.2025-08-13T08-35-41Z
          MC_SHA256: 01f866e9c5f9b87c2b09116fa5d7c06695b106242d829a8bb32990c00312e891
        run: |
          set -euo pipefail
          curl -fsSL "https://dl.min.io/client/mc/release/linux-amd64/archive/mc.${MC_RELEASE}" -o /usr/local/bin/mc
          echo "${MC_SHA256}  /usr/local/bin/mc" | sha256sum -c -
          chmod +x /usr/local/bin/mc
          mc --version

      - name: Upload community catalog to CDN
        if: steps.gate.outputs.enabled == 'true'
        env:
          CDN_ENDPOINT: ${{ secrets.CDN_ENDPOINT }}
          CDN_ACCESS_KEY: ${{ secrets.CDN_ACCESS_KEY }}
          CDN_SECRET_KEY: ${{ secrets.CDN_SECRET_KEY }}
          CDN_BUCKET: ${{ secrets.CDN_BUCKET }}
        run: |
          set -euo pipefail
          # IMPORTANT: this registry publishes the COMMUNITY catalog under its OWN
          # object key — NOT the official `catalog.json` (which carries the curated
          # first-party modules from core's seed and must never be clobbered from
          # here). Instances opt into community plugins by adding this URL as an
          # extra catalog source (B2 multi-source). Migrating the first-party
          # modules into this repo to unify them is a separate future step.
          KEY="community-catalog.json"
          # Prefer the MinIO client `mc` (installed above); fall back to `aws s3`.
          if command -v mc >/dev/null 2>&1; then
            mc alias set aihcdn "$CDN_ENDPOINT" "$CDN_ACCESS_KEY" "$CDN_SECRET_KEY"
            mc cp catalog.json "aihcdn/${CDN_BUCKET}/${KEY}"
            echo "Uploaded community catalog via mc to ${CDN_BUCKET}/${KEY}"
          elif command -v aws >/dev/null 2>&1; then
            AWS_ACCESS_KEY_ID="$CDN_ACCESS_KEY" \
            AWS_SECRET_ACCESS_KEY="$CDN_SECRET_KEY" \
            aws --endpoint-url "$CDN_ENDPOINT" s3 cp catalog.json "s3://${CDN_BUCKET}/${KEY}"
            echo "Uploaded community catalog via aws s3 to ${CDN_BUCKET}/${KEY}"
          else
            echo "::error::neither 'mc' nor 'aws' is available on the runner — install one to publish"
            exit 1
          fi
